# fly.toml app configuration file generated for fall-detection-yvlv1a on 2026-05-03T07:47:03Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fall-detection-yvlv1a'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '15s'
    timeout = '15s'
    grace_period = '1m30s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '2048mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
