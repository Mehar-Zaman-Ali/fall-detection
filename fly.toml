# Fly.io — https://fly.io/docs/reference/configuration/
# Must match the Fly app name shown when you create/connect the app.
# Set `app` to your Fly app name (Dashboard → app name), or run: fly config save -a YOUR_APP
app = "fall-detection-yvlv1a"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  # Fly warns if > 1m; keep at or under 60s
  grace_period = "60s"
  interval = "15s"
  method = "GET"
  timeout = "15s"
  path = "/api/health"

# TensorFlow + Ultralytics need real RAM; raise to "4096mb" if you still OOM.
[[vm]]
  cpus = 1
  cpu_kind = "shared"
  memory = "2048mb"
